name: iOS Build & TestFlight
#
# Branch Strategy (mirrors build-macos.yml + Morpheus-Lumerin-Node):
#   • dev:  Build + upload to TestFlight Internal Group (no review)
#   • main: Build + upload to TestFlight + git tag + GitHub Release (notes only)
#
# App Store submission for review is intentionally NOT automated. The actual
# "Submit for Review" button in App Store Connect requires complete metadata
# (screenshots, age rating, review notes, what's-new copy), and an Apple
# rejection is expensive enough that gating it behind a human eyeball click
# is the right call. Once the build lands in TestFlight from main, promote
# it to App Store via App Store Connect → My Apps → 1.0 Prepare for Submission
# → "Add Build" → click Submit.
#
# SemVer Tagging:
#   • main: auto-bumps MINOR (v3.4.0, v3.5.0, …) unless VMAJ_NEW is raised
#   • dev:  vMAJ.MIN.COMMITS-dev (e.g. v3.4.7-dev) — not published to GH
#
# Trigger: fires on push (i.e. PR merge) to dev or main only.

on:
  push:
    branches: [dev, main]

concurrency:
  group: ci-ios-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.41.7"
  GO_VERSION: "1.26"
  # Bundle identifier registered in App Store Connect (matches
  # ios/Runner.xcodeproj/project.pbxproj DEVELOPMENT_TEAM 2S4578V7ZD).
  IOS_BUNDLE_ID: "com.absgrafx.nodeneo"

permissions:
  contents: write

jobs:
  # ── SemVer Tag Generation ─────────────────────────────────────────
  # Identical logic to build-macos.yml so a given commit gets the SAME
  # tag whether it ships to macOS or iOS. Important: the iOS build number
  # (CFBundleVersion) is set from GITHUB_RUN_NUMBER, which is global to the
  # repo, so an iOS build cannot collide with a macOS build of the same
  # short version — App Store Connect rejects duplicate
  # (CFBundleShortVersionString, CFBundleVersion) pairs.
  generate-tag:
    runs-on: ubuntu-latest
    name: Generate SemVer Tag
    outputs:
      tag_name: ${{ steps.semver.outputs.tag_name }}
      vfull: ${{ steps.semver.outputs.vfull }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Compute next version
        id: semver
        run: |
          # Source of truth is pubspec.yaml's `version:` line. Format:
          # "version: 3.4.0+1" -> VPUB=3.4.0. CFBundleShortVersionString
          # (visible in TestFlight + App Store) and the git tag both derive
          # from this. The build number (CFBundleVersion) is set separately
          # to GITHUB_RUN_NUMBER in the build-ios job, which keeps each
          # upload's (CFBundleShortVersionString, CFBundleVersion) pair
          # unique even within a single VPUB cycle.
          VPUB=$(grep -E '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          if ! echo "$VPUB" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::pubspec.yaml version is not a clean semver: '${VPUB}'"
            exit 1
          fi

          if [ "$GITHUB_REF_NAME" = "main" ]; then
            VFULL=$VPUB
            VTAG=v${VFULL}
          else
            # Dev preview: same VFULL as the upcoming main release (ASC
            # requires CFBundleShortVersionString to be clean X.Y.Z) but the
            # git tag gets a "-dev" suffix so it doesn't collide with the
            # eventual main release tag for the same pubspec version.
            VFULL=$VPUB
            RNAME=${GITHUB_REF_NAME##*/}
            VTAG=v${VFULL}-${RNAME}
          fi

          echo "tag_name=${VTAG}" >> "$GITHUB_OUTPUT"
          echo "vfull=${VFULL}"   >> "$GITHUB_OUTPUT"
          echo "### Build Tag: \`${VTAG}\` (CFBundleShortVersionString: \`${VFULL}\`)" >> "$GITHUB_STEP_SUMMARY"

  # ── Build IPA + ship to TestFlight ────────────────────────────────
  build-ios:
    runs-on: macos-latest
    needs: generate-tag
    timeout-minutes: 45
    env:
      APP_VERSION: ${{ needs.generate-tag.outputs.vfull }}
      TAG_NAME: ${{ needs.generate-tag.outputs.tag_name }}

    steps:
      - uses: actions/checkout@v5

      # ── Toolchains ──
      # Xcode 26 / iOS 26 SDK is required by App Store Connect for any
      # upload (validation 409 "SDK version issue" otherwise). The hosted
      # macos-latest image installs multiple Xcode versions and defaults
      # to one that may lag what ASC accepts; setup-xcode flips xcode-select
      # to the newest non-beta Xcode on the runner before any xcodebuild,
      # flutter, or altool invocation.
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Print active Xcode + iOS SDK versions
        run: |
          echo "Active Xcode:"
          xcodebuild -version
          echo ""
          echo "Active iphoneos SDK:"
          xcrun --sdk iphoneos --show-sdk-version
          echo ""
          echo "Available Xcodes on this runner:"
          ls -1d /Applications/Xcode*.app 2>/dev/null || true

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go/go.mod

      - name: Install Python dependencies (branding pipeline)
        run: pip3 install --break-system-packages cairosvg

      # ── Resolve embedded proxy-router version ──
      # Same step as build-macos.yml, with the bare-hash fix applied here too:
      # we drop --single-branch so `git describe --tags` can reach release tags
      # cut from main even when our pinned commit is on dev. Without this,
      # the in-app "About" → "Proxy-router" row shows the bare 12-char hash
      # instead of the v7.0.0-N-g<hash> form.
      - name: Determine embedded proxy-router version
        id: pr_version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_COMMIT=$(grep 'MorpheusAIs/Morpheus-Lumerin-Node/proxy-router' go/go.mod | grep -oE '[0-9a-f]{12}$' || echo "unknown")
          git clone --filter=blob:none --no-checkout \
            https://github.com/MorpheusAIs/Morpheus-Lumerin-Node.git /tmp/morpheus-lumerin-node 2>/dev/null || true
          cd /tmp/morpheus-lumerin-node
          git fetch origin --tags 2>/dev/null || true
          git fetch origin main:main 2>/dev/null || true
          PR_VERSION=$(git describe --tags --always --match 'v*' "$PR_COMMIT" 2>/dev/null || echo "$PR_COMMIT")
          echo "PR_VERSION=$PR_VERSION" >> "$GITHUB_OUTPUT"
          echo "PR_COMMIT=$PR_COMMIT" >> "$GITHUB_OUTPUT"
          echo "Embedded proxy-router: $PR_VERSION ($PR_COMMIT)"

      # ── Build Go iOS static archive ──
      # `make go-ios` produces build/go/ios/libnodeneo.a as a c-archive for
      # arm64 device (LC_BUILD_VERSION platform=2). The flutter build below
      # links it via the Xcode project's "Other Linker Flags" entry.
      - name: Build Go iOS static archive
        env:
          PR_VERSION: ${{ steps.pr_version.outputs.PR_VERSION }}
          PR_COMMIT: ${{ steps.pr_version.outputs.PR_COMMIT }}
        run: make go-ios

      # ── Flutter dependencies ──
      - name: Flutter pub get
        run: flutter pub get

      # ── Branding pipeline ──
      - name: Rasterize brand assets
        run: |
          python3 tools/branding/render_launcher_icons.py
          dart run flutter_launcher_icons
          dart run flutter_native_splash:create

      # ── Set up the Apple Distribution signing identity ──
      # The .p12 cert is exported from the maintainer's keychain (Keychain
      # Access → "Apple Distribution: <account name> (<team id>)" →
      # right-click → Export → .p12 with a password) and stored as a
      # base64-encoded GitHub Secret. We import it into a fresh ephemeral
      # keychain so it doesn't bleed into the runner's default keychain or
      # persist across jobs. The keychain is unlocked once with
      # KEYCHAIN_PASSWORD and the partition list is opened so codesign can
      # use the key without interactive prompting.
      - name: Import Apple Distribution certificate
        env:
          APPLE_DIST_CERT_P12_BASE64: ${{ secrets.APPLE_DIST_CERT_P12_BASE64 }}
          APPLE_DIST_CERT_PASSWORD: ${{ secrets.APPLE_DIST_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "$APPLE_DIST_CERT_P12_BASE64" ]; then
            echo "::error::APPLE_DIST_CERT_P12_BASE64 secret is empty."
            echo "          Export the Apple Distribution cert from Keychain"
            echo "          Access as a .p12, base64-encode it"
            echo "          (\`base64 -i dist.p12 | pbcopy\`), and paste the"
            echo "          result into the APPLE_DIST_CERT_P12_BASE64 GitHub"
            echo "          Secret. Set APPLE_DIST_CERT_PASSWORD to the .p12"
            echo "          export password and KEYCHAIN_PASSWORD to any"
            echo "          random string used to unlock the runner keychain."
            exit 1
          fi
          echo "$APPLE_DIST_CERT_P12_BASE64" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$APPLE_DIST_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm certificate.p12
          security find-identity -p codesigning -v build.keychain

      # ── Place ASC API key where xcrun altool looks for it ──
      # The .p8 file must live at the standard path
      # ~/.appstoreconnect/private_keys/AuthKey_<KEYID>.p8 — same convention
      # `make upload-testflight` follows. Used by the altool upload step
      # below. (xcodebuild's archive-time signing does NOT pick up this
      # key automatically — `flutter build ipa` doesn't pass the
      # -authenticationKey* flags through to xcodebuild — so we additionally
      # pre-fetch the provisioning profile in the next step.)
      - name: Stage App Store Connect API key
        env:
          APPLE_ASC_API_KEY_ID: ${{ secrets.APPLE_ASC_API_KEY_ID }}
          APPLE_ASC_API_KEY_P8: ${{ secrets.APPLE_ASC_API_KEY_P8 }}
        run: |
          if [ -z "$APPLE_ASC_API_KEY_ID" ] || [ -z "$APPLE_ASC_API_KEY_P8" ]; then
            echo "::error::APPLE_ASC_API_KEY_ID or APPLE_ASC_API_KEY_P8 is empty."
            echo "          Create an App Store Connect API key at:"
            echo "          App Store Connect → Users and Access → Integrations"
            echo "          → Team Keys → +. Choose 'Developer' (or 'App Manager')"
            echo "          access. Download the .p8 ONCE — Apple will not show"
            echo "          it again. Set APPLE_ASC_API_KEY_ID to the 10-char"
            echo "          key id, APPLE_ASC_API_ISSUER_ID to the team's issuer"
            echo "          UUID (visible on the same page), and"
            echo "          APPLE_ASC_API_KEY_P8 to the base64-encoded .p8 body."
            exit 1
          fi
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          echo "$APPLE_ASC_API_KEY_P8" | base64 --decode \
            > "$HOME/.appstoreconnect/private_keys/AuthKey_${APPLE_ASC_API_KEY_ID}.p8"
          chmod 600 "$HOME/.appstoreconnect/private_keys/AuthKey_${APPLE_ASC_API_KEY_ID}.p8"
          echo "ASC API key staged at ~/.appstoreconnect/private_keys/AuthKey_${APPLE_ASC_API_KEY_ID}.p8"

      # ── Stage the manually-managed App Store provisioning profile ──
      # Why not auto-sign or let the ASC API download a managed profile?
      # On a clean CI runner there's no Apple ID logged into Xcode, so
      # automatic signing's "fetch a managed profile" path fails with
      # "No Accounts". Pre-fetching the Xcode-managed profile via the ASC
      # API also fails for two reasons under manual signing:
      #   1) Xcode refuses Xcode-managed profiles when CODE_SIGN_STYLE=Manual:
      #      "is Xcode managed, but signing settings require a manually
      #       managed profile."
      #   2) The Xcode-managed App Store profile in our team didn't include
      #      our specific Apple Distribution cert in its DeveloperCertificates
      #      list anyway.
      #
      # Solution: a manually-managed App Store profile created once in the
      # Apple Developer portal that explicitly lists our Apple Distribution
      # cert (the same one whose .p12 we import via APPLE_DIST_CERT_P12_BASE64).
      # The .mobileprovision contents aren't secret (they're shipped inside
      # every IPA), but we keep them in a secret so team layout stays out of
      # the repo and annual renewal is a single secret update.
      #
      # The next step patches project.pbxproj's Runner Release config to
      # Manual signing pointing at this profile by *name*, read from the
      # profile itself — so renaming the profile in the dev portal and
      # re-uploading the secret is the only step needed; nothing in the
      # workflow has to change.
      - name: Stage App Store provisioning profile
        env:
          IOS_PROFILE_APP_STORE_BASE64: ${{ secrets.IOS_PROFILE_APP_STORE_BASE64 }}
        run: |
          set -euo pipefail
          if [ -z "$IOS_PROFILE_APP_STORE_BASE64" ]; then
            echo "::error::IOS_PROFILE_APP_STORE_BASE64 secret is empty."
            echo "          Create a *manually-managed* App Store profile in the Apple Developer"
            echo "          portal (https://developer.apple.com/account/resources/profiles/list)"
            echo "          for bundle id ${IOS_BUNDLE_ID}, select the Apple Distribution cert"
            echo "          whose .p12 is in APPLE_DIST_CERT_P12_BASE64, download the"
            echo "          .mobileprovision, and store it as IOS_PROFILE_APP_STORE_BASE64."
            exit 1
          fi
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          DEST="$PROFILE_DIR/nodeneo_app_store.mobileprovision"
          echo "$IOS_PROFILE_APP_STORE_BASE64" | base64 --decode > "$DEST"
          PLIST="$(security cms -D -i "$DEST")"
          PROFILE_NAME="$(echo "$PLIST" | plutil -extract Name raw -o - -)"
          PROFILE_UUID="$(echo "$PLIST" | plutil -extract UUID raw -o - -)"
          IS_XCODE_MANAGED="$(echo "$PLIST" | plutil -extract IsXcodeManaged raw -o - - 2>/dev/null || echo false)"
          PROFILE_BUNDLE_ID="$(echo "$PLIST" | plutil -extract Entitlements.application-identifier raw -o - - | sed 's/^[^.]*\.//')"
          echo "Profile: name='$PROFILE_NAME' uuid=$PROFILE_UUID"
          echo "  bundle_id=$PROFILE_BUNDLE_ID  xcode_managed=$IS_XCODE_MANAGED"
          if [ "$IS_XCODE_MANAGED" = "true" ]; then
            echo "::error::Profile is Xcode-managed. Manual signing rejects Xcode-managed profiles."
            echo "          Recreate it in the dev portal as a regular App Store profile (NOT"
            echo "          'Xcode automatically signs') and re-encode for IOS_PROFILE_APP_STORE_BASE64."
            exit 1
          fi
          if [ "$PROFILE_BUNDLE_ID" != "$IOS_BUNDLE_ID" ]; then
            echo "::error::Profile bundle id ($PROFILE_BUNDLE_ID) doesn't match IOS_BUNDLE_ID ($IOS_BUNDLE_ID)."
            exit 1
          fi

      # ── Switch Runner target's Release config to manual signing ──
      # Patches only the Runner-target Release config block (UUID
      # 97C147071CF9000F007C117D) so Debug / Profile configs (used by
      # local `flutter run` on a developer's device) keep their existing
      # Automatic signing. ExportOptions.plist is patched in-place too so
      # `xcodebuild -exportArchive` uses the same profile/team for IPA
      # export. The committed pbxproj + ExportOptions.plist on disk stay
      # on Automatic; both edits disappear with the runner.
      - name: Switch Xcode project to manual signing (Release)
        env:
          IOS_BUNDLE_ID: ${{ env.IOS_BUNDLE_ID }}
        run: |
          set -euo pipefail
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          PROFILE_PATH="$(ls -t "$PROFILE_DIR"/*.mobileprovision 2>/dev/null | head -n1 || true)"
          if [ -z "$PROFILE_PATH" ]; then
            echo "::error::No provisioning profile found in $PROFILE_DIR (download step must have failed)."
            exit 1
          fi
          PLIST="$(security cms -D -i "$PROFILE_PATH")"
          PROFILE_NAME="$(echo "$PLIST" | plutil -extract Name raw -o - -)"
          PROFILE_UUID="$(echo "$PLIST" | plutil -extract UUID raw -o - -)"
          echo "Profile: name='$PROFILE_NAME' uuid=$PROFILE_UUID"
          echo "  path: $PROFILE_PATH"
          export PROFILE_NAME
          python3 - <<'PY'
          import os, re, sys
          path = "ios/Runner.xcodeproj/project.pbxproj"
          name = os.environ["PROFILE_NAME"]
          src = open(path).read()
          # Locate the Runner native target's Release config block by its
          # stable UUID (97C147071CF9000F007C117D) so we don't touch Debug,
          # Profile, or the RunnerTests target's Release config.
          pat = re.compile(
              r"(97C147071CF9000F007C117D /\* Release \*/ = \{[\s\S]*?buildSettings = \{)"
              r"([\s\S]*?)"
              r"(\};\s*name = Release;\s*\};)",
              re.M,
          )
          def patch(m):
              head, body, tail = m.group(1), m.group(2), m.group(3)
              body = body.replace(
                  'CODE_SIGN_IDENTITY = "Apple Development";',
                  'CODE_SIGN_IDENTITY = "Apple Distribution";\n'
                  '\t\t\t\t"CODE_SIGN_IDENTITY[sdk=iphoneos*]" = "Apple Distribution";',
              )
              body = body.replace(
                  'CODE_SIGN_STYLE = Automatic;',
                  'CODE_SIGN_STYLE = Manual;',
              )
              body = body.replace(
                  'PROVISIONING_PROFILE_SPECIFIER = "";',
                  f'PROVISIONING_PROFILE_SPECIFIER = "{name}";',
              )
              return head + body + tail
          new, n = pat.subn(patch, src, count=1)
          if n != 1:
              sys.stderr.write("ERROR: failed to locate Runner Release config block.\n")
              sys.exit(1)
          if new == src:
              sys.stderr.write("ERROR: patch matched but produced no change.\n")
              sys.exit(1)
          open(path, "w").write(new)
          print(f"project.pbxproj: Runner Release config -> Manual signing, profile='{name}'")
          PY
          # Patch ExportOptions.plist so the export step (-exportArchive) uses
          # the same manual mapping. Local dev (`make ipa-testflight`) reads
          # the file as committed (automatic), so this in-place edit is
          # CI-only and disappears with the runner.
          /usr/libexec/PlistBuddy -c "Set :signingStyle manual" ios/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles dict" ios/ExportOptions.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy \
            -c "Add :provisioningProfiles:$IOS_BUNDLE_ID string $PROFILE_NAME" \
            ios/ExportOptions.plist 2>/dev/null \
            || /usr/libexec/PlistBuddy \
                 -c "Set :provisioningProfiles:$IOS_BUNDLE_ID $PROFILE_NAME" \
                 ios/ExportOptions.plist
          echo "ExportOptions.plist (post-patch):"
          /usr/libexec/PlistBuddy -c "Print" ios/ExportOptions.plist

      # ── Build the IPA ──
      # Uses the same path local devs run via `make ipa-testflight`:
      #   flutter build ipa --release --export-options-plist=ios/ExportOptions.plist
      # On CI, the previous step has flipped the Runner Release config and
      # ExportOptions.plist to manual signing using the App Store profile we
      # downloaded; locally, both files stay on automatic. CFBundleShortVersionString
      # comes from --build-name, CFBundleVersion from --build-number (must be
      # unique per short-version pair across all uploads to ASC).
      - name: Flutter build IPA (release)
        env:
          ETH_RPC_URL: ${{ secrets.ETH_RPC_URL }}
        run: |
          # BUILD_CHANNEL drives the in-app About screen's version display
          # (vX.Y.Z on main, vX.Y.Z+RUN on dev) via the formatVersion helper
          # in lib/constants/app_brand.dart. The IPA's CFBundleShortVersionString
          # stays clean X.Y.Z either way — preview vs stable is purely a
          # display-time decision, not a binary-level one.
          if [ "$GITHUB_REF_NAME" = "main" ]; then
            BUILD_CHANNEL=stable
          else
            BUILD_CHANNEL=preview
          fi
          DART_DEFINES="--build-name=${APP_VERSION} --build-number=${GITHUB_RUN_NUMBER}"
          DART_DEFINES="$DART_DEFINES --dart-define=BUILD_CHANNEL=${BUILD_CHANNEL}"
          if [ -n "$ETH_RPC_URL" ]; then
            DART_DEFINES="$DART_DEFINES --dart-define=ETH_RPC_URL=${ETH_RPC_URL}"
          fi
          flutter build ipa --release \
            --export-options-plist=ios/ExportOptions.plist \
            $DART_DEFINES
          ls -lh build/ios/ipa/*.ipa

      # ── Verify Go FFI symbols survived Apple's strip pass ──
      # Mirrors the local `_verify-ipa-symbols` Makefile check. If
      # STRIP_STYLE drifts back to "all", Init/Shutdown/etc. get nuked and
      # Dart's dlsym fails at runtime with "Failed to lookup symbol 'Init'",
      # which only surfaces on TestFlight install. Catching here saves a
      # 10-15 min upload + processing round-trip + the test-pilot install
      # before anyone notices.
      - name: Verify Go FFI symbols in IPA
        run: |
          IPA="$(ls -t build/ios/ipa/*.ipa | head -1)"
          TMPDIR_CHECK=$(mktemp -d)
          unzip -q -p "$IPA" Payload/Runner.app/Runner > "$TMPDIR_CHECK/Runner"
          if ! nm -gU "$TMPDIR_CHECK/Runner" 2>/dev/null | grep -q ' _Init$'; then
            echo "::error::Go FFI symbol 'Init' is NOT exported in the shipped Runner binary."
            echo "          The IPA will fail at runtime with:"
            echo "            Failed to lookup symbol 'Init': dlsym(RTLD_DEFAULT, Init); symbol not found"
            echo "          Most likely cause: STRIP_STYLE in ios/Runner.xcodeproj/project.pbxproj"
            echo "          reverted to 'all' (Apple default). Set STRIP_STYLE = \"non-global\" in the"
            echo "          Runner target's Debug, Profile, AND Release configs."
            rm -rf "$TMPDIR_CHECK"
            exit 1
          fi
          rm -rf "$TMPDIR_CHECK"
          echo "Symbol verification: Init is exported ✓"

      # ── Upload IPA to TestFlight (dev only) ──
      # TestFlight is the dev-preview distribution channel. Internal-Group
      # testers see the build ~10-30 min after upload. We deliberately do
      # NOT upload from `main`: the App Store production track is its own
      # destination (different ExportOptions distribution, different review
      # queue, different audience) and conflating the two would surface
      # release-candidate builds to TestFlight reviewers as if they were
      # ordinary betas. The main-branch upload to App Store production is
      # planned to land in this same workflow once App Store review
      # approval is in place — see the "Future: App Store production
      # upload (main)" comment below.
      #
      # Uses the modern altool path (xcrun iTMSTransporter was removed in
      # Xcode 26 CLI tools). The ASC API key on disk is what authenticates;
      # no Apple ID password needed in CI.
      - name: Upload IPA to TestFlight
        if: github.ref == 'refs/heads/dev'
        env:
          APPLE_ASC_API_KEY_ID: ${{ secrets.APPLE_ASC_API_KEY_ID }}
          APPLE_ASC_API_ISSUER_ID: ${{ secrets.APPLE_ASC_API_ISSUER_ID }}
        run: |
          IPA="$(ls -t build/ios/ipa/*.ipa | head -1)"
          if [ -z "$IPA" ]; then
            echo "::error::No IPA found in build/ios/ipa/. The build step above must have failed."
            exit 1
          fi
          echo "Uploading $IPA to App Store Connect..."
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA" \
            --apiKey "$APPLE_ASC_API_KEY_ID" \
            --apiIssuer "$APPLE_ASC_API_ISSUER_ID"
          echo "### TestFlight upload" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Build \`v${APP_VERSION} (${GITHUB_RUN_NUMBER})\` is uploaded." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Processing typically takes 10–30 min. Watch for it under" >> "$GITHUB_STEP_SUMMARY"
          echo "**App Store Connect → ${IOS_BUNDLE_ID} → TestFlight**." >> "$GITHUB_STEP_SUMMARY"

      # ── Note: main IPA does not auto-publish ──
      # On main the workflow still builds + verifies the IPA and uploads
      # it as a workflow artifact (see step below) so the binary is
      # downloadable and inspectable. It does NOT push to TestFlight
      # (above) or to a GitHub Release (the macOS workflow owns both
      # the tag and the release page; iOS has no asset to attach).
      #
      # Future: App Store production upload (main).
      # Once App Store review approval is granted for `com.absgrafx.nodeneo`,
      # add a `Upload IPA to App Store production` step here, gated
      # `if: github.ref == 'refs/heads/main'`. It will use the same
      # `xcrun altool --upload-app --type ios` invocation as TestFlight
      # but with an `ExportOptions.plist` configured for `app-store`
      # distribution. App Store submission for review will still be a
      # deliberate manual click in App Store Connect — the upload is
      # the only part to automate.
      - name: Note (main builds do not auto-publish)
        if: github.ref == 'refs/heads/main'
        run: |
          echo "### Main IPA built — not auto-published" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "TestFlight uploads are gated to \`dev\` (preview channel)." >> "$GITHUB_STEP_SUMMARY"
          echo "App Store production upload from \`main\` will be wired in" >> "$GITHUB_STEP_SUMMARY"
          echo "once App Store review approval lands. The IPA artifact" >> "$GITHUB_STEP_SUMMARY"
          echo "below is the binary that would have been pushed." >> "$GITHUB_STEP_SUMMARY"

      # ── Upload IPA as workflow artifact (always) ──
      # Lets you download and inspect the binary even if the TestFlight upload
      # gets stuck mid-processing. 14-day retention matches macOS workflow.
      # Artifact name carries the +RUN suffix on dev to mirror DMG naming
      # and the in-app "v3.4.0+42" preview label.
      - name: Compute IPA artifact name
        id: ipa_artifact
        run: |
          if [ "$GITHUB_REF_NAME" = "main" ]; then
            echo "name=nodeneo-${APP_VERSION}-ios.ipa" >> "$GITHUB_OUTPUT"
          else
            echo "name=nodeneo-${APP_VERSION}+${GITHUB_RUN_NUMBER}-ios.ipa" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.ipa_artifact.outputs.name }}
          path: build/ios/ipa/*.ipa
          retention-days: 14

      # ── Tagging + GitHub Release ──
      # Owned by the macOS workflow exclusively. The macOS DMG is the
      # only downloadable binary asset on a Node Neo release; it would
      # be confusing to have iOS create the same tag/release with no
      # asset to attach (and on a v3.4.0 ship that race-created an
      # asset-less release that had to be patched up manually).
      # See `.github/workflows/build-macos.yml` → "GitHub Release" step.
