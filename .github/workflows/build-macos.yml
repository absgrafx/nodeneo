name: macOS Build & Release
#
# Branch Strategy:
#   • dev:  Build + sign + notarize → DMG uploaded as workflow artifact only
#           (no GH Release). Same Apple signing path as production so a
#           cert / profile / notary-service regression shows up on dev,
#           not on release day. The dev preview DMG installs like a real
#           release (no xattr ritual, no right-click → Open).
#   • main: Same pipeline + DMG published as a tagged GH Release with
#           RELEASE_NOTES.md as the body.
#
# Versioning (see lib/constants/app_brand.dart's BUILD_CHANNEL plumbing):
#   • main: vX.Y.Z, DMG named `Node Neo-X.Y.Z-macOS.dmg`. CFBundleVersion
#           is set equal to CFBundleShortVersionString so AppDelegate's
#           runtime About-panel override clears the trailing `(N)` parens.
#   • dev:  vX.Y.Z+N, DMG named `Node Neo-X.Y.Z+N-macOS.dmg`,
#           git tag `vX.Y.Z-dev` (not pushed as a release).
#
# N = `git rev-list --count <last-vX.Y.Z-tag>..HEAD` — the count of dev
# commits since the most recent release. Resets to ~1 every main release.
# Both workflows compute this independently against the same head_sha →
# `Node Neo-3.5.0+4-macOS.dmg` and TestFlight's `v3.5.0 (4)` agree by
# construction, no cross-workflow API call needed. See the "Compute
# BUILD_NUMBER" step below.
#
# Trigger: fires on push (i.e. PR merge) to dev or main only.

on:
  push:
    branches: [dev, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.41.7"
  GO_VERSION: "1.26"

permissions:
  contents: write

jobs:
  # ── SemVer Tag Generation ─────────────────────────────────────────
  generate-tag:
    runs-on: ubuntu-latest
    name: Generate SemVer Tag
    outputs:
      tag_name: ${{ steps.semver.outputs.tag_name }}
      vfull: ${{ steps.semver.outputs.vfull }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Compute next version
        id: semver
        run: |
          # Source of truth is pubspec.yaml's `version:` line. Format:
          # "version: 3.4.0+1" -> VPUB=3.4.0. The DMG name and git tag both
          # derive from this; matches the iOS workflow byte-for-byte so a
          # given commit gets the same tag whether it ships to macOS or iOS.
          VPUB=$(grep -E '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          if ! echo "$VPUB" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::pubspec.yaml version is not a clean semver: '${VPUB}'"
            exit 1
          fi

          if [ "$GITHUB_REF_NAME" = "main" ]; then
            VFULL=$VPUB
            VTAG=v${VFULL}
          else
            # Dev preview: same VFULL as the upcoming main release; the
            # git tag gets a "-dev" suffix so it doesn't collide with the
            # eventual main release tag for the same pubspec version.
            VFULL=$VPUB
            RNAME=${GITHUB_REF_NAME##*/}
            VTAG=v${VFULL}-${RNAME}
          fi

          echo "tag_name=${VTAG}" >> "$GITHUB_OUTPUT"
          echo "vfull=${VFULL}"   >> "$GITHUB_OUTPUT"
          echo "### Build Tag: \`${VTAG}\`" >> "$GITHUB_STEP_SUMMARY"

  # ── Build ──────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    needs: generate-tag
    timeout-minutes: 30
    env:
      APP_VERSION: ${{ needs.generate-tag.outputs.vfull }}
      TAG_NAME: ${{ needs.generate-tag.outputs.tag_name }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      # ── Compute BUILD_NUMBER (commits since last release tag) ─────────
      # Replaces the per-workflow `GITHUB_RUN_NUMBER` we used through
      # v3.4.0. The run-number counter never resets, so dev previews of
      # v3.5.0 were starting at +11 (the cumulative iOS workflow count
      # from the v3.4.0 train) instead of +1 — visually misleading
      # because the small integer is what most readers parse as "build N
      # of this version".
      #
      # New scheme: BUILD_NUMBER = (commits in HEAD's ancestry that are
      # NOT in the most recent vX.Y.Z tag's ancestry). It resets to ~1
      # automatically every time a release lands on main, because the
      # release tag absorbs all of dev's prior history.
      #
      # We deliberately use `git tag --list` (no --merged filter) rather
      # than `git describe`: the v3.4.0 tag was cut from a merge commit
      # on main that isn't in dev's ancestry, so `describe` returns
      # nothing while `rev-list a..HEAD` correctly computes the symmetric
      # difference (the count of new dev commits since the tag).
      #
      # macOS and iOS both run this same logic against the same head_sha
      # → identical BUILD_NUMBER on both platforms, no cross-workflow
      # API call needed (we used to look up the iOS workflow's run number
      # to keep them aligned; obsolete now).
      #
      # Caveat: if release PRs to main ever switch from `--merge` to
      # squash, dev's history is no longer absorbed and the count will
      # balloon. v3.4.0 was merged with `--merge` (1808159 in main's
      # log); keep that convention.
      - name: Compute BUILD_NUMBER (commits since last release tag)
        id: build_num
        run: |
          LAST_TAG=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | head -1 || true)
          if [ -n "$LAST_TAG" ]; then
            BNUM=$(git rev-list --count "${LAST_TAG}..HEAD" 2>/dev/null || echo "")
          else
            BNUM=$(git rev-list --count HEAD 2>/dev/null || echo "")
          fi
          [ -z "$BNUM" ] && BNUM=1
          [ "$BNUM" -lt 1 ] && BNUM=1
          echo "BUILD_NUMBER=${BNUM}" >> "$GITHUB_ENV"
          echo "build_number=${BNUM}" >> "$GITHUB_OUTPUT"
          echo "Computed BUILD_NUMBER=${BNUM} (commits since ${LAST_TAG:-<no release tag>})"

      # ── Toolchains ──
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go/go.mod

      - name: Install Python dependencies (branding pipeline)
        run: pip3 install --break-system-packages cairosvg

      # ── Resolve embedded proxy-router version ──
      # Drop --single-branch and explicitly fetch main so `git describe --tags`
      # can reach release tags (cut from main) as ancestors of the dev-pinned
      # commit. Without this the in-app About screen shows the bare 12-char
      # hash instead of the v7.0.0-N-g<hash> form the ldflag is meant to
      # produce. Cosmetic, but it's the version users read on every release.
      - name: Determine embedded proxy-router version
        id: pr_version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_COMMIT=$(grep 'MorpheusAIs/Morpheus-Lumerin-Node/proxy-router' go/go.mod | grep -oE '[0-9a-f]{12}$' || echo "unknown")
          git clone --filter=blob:none --no-checkout \
            https://github.com/MorpheusAIs/Morpheus-Lumerin-Node.git /tmp/morpheus-lumerin-node 2>/dev/null || true
          cd /tmp/morpheus-lumerin-node
          git fetch origin --tags 2>/dev/null || true
          git fetch origin main:main 2>/dev/null || true
          PR_VERSION=$(git describe --tags --always --match 'v*' "$PR_COMMIT" 2>/dev/null || echo "$PR_COMMIT")
          echo "PR_VERSION=$PR_VERSION" >> "$GITHUB_OUTPUT"
          echo "PR_COMMIT=$PR_COMMIT" >> "$GITHUB_OUTPUT"
          echo "Embedded proxy-router: $PR_VERSION ($PR_COMMIT)"

      # ── Build Go dylib ──
      - name: Build Go shared library
        env:
          PR_VERSION: ${{ steps.pr_version.outputs.PR_VERSION }}
          PR_COMMIT: ${{ steps.pr_version.outputs.PR_COMMIT }}
        run: make go-macos

      # ── Flutter dependencies ──
      - name: Flutter pub get
        run: flutter pub get

      # ── Branding pipeline ──
      - name: Rasterize brand assets
        run: |
          python3 tools/branding/render_launcher_icons.py
          dart run flutter_launcher_icons
          dart run flutter_native_splash:create

      # ── Disable Xcode signing for flutter build (all branches) ──
      # Xcode auto-signing requires a local cert at build time. We strip it
      # here so `flutter build` always succeeds unsigned. On main the post-build
      # codesign step re-signs the .app with the imported Developer ID cert.
      - name: Strip Xcode auto-signing for CI
        run: |
          sed -i '' 's/CODE_SIGN_IDENTITY = "Apple Development"/CODE_SIGN_IDENTITY = "-"/g' macos/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_STYLE = Automatic/CODE_SIGN_STYLE = Manual/g' macos/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/DEVELOPMENT_TEAM = .*;/DEVELOPMENT_TEAM = "";/g' macos/Runner.xcodeproj/project.pbxproj

      # ── Build release app (inject version + optional premium RPC) ──
      # BUILD_CHANNEL is consumed by lib/constants/app_brand.dart's
      # AppBrand.formatVersion() to decide whether the in-app About
      # screen shows "v3.5.0" (main release) or "v3.5.0+42" (dev preview).
      # The CFBundleShortVersionString in Info.plist stays clean X.Y.Z
      # either way; the +RUN suffix is purely a display-layer cue.
      #
      # CFBundleVersion (passed as --build-number) is what AppKit
      # normally renders as "(N)" after "Version X.Y.Z" in the macOS
      # About panel. We hide that parens segment on stable builds via
      # `macos/Runner/AppDelegate.swift` — it overrides the standard
      # About menu item and clears `applicationVersion` whenever
      # `CFBundleVersion == CFBundleShortVersionString`.
      #
      # That's why on `main` we set CFBundleVersion to APP_VERSION here:
      # the equality is the runtime signal AppDelegate looks for. End
      # result: stable About panel reads `Version 3.5.0` (no parens).
      #
      # On `dev` we use the integer BUILD_NUMBER, so CFBundleVersion is
      # never equal to a SemVer string, AppDelegate falls through, and
      # the panel keeps the default `Version 3.5.0 (N)` rendering — the
      # `(N)` is what lets a downloaded preview be cross-referenced
      # against its TestFlight build at a glance.
      - name: Flutter build macOS (release)
        env:
          ETH_RPC_URL: ${{ secrets.ETH_RPC_URL }}
        run: |
          if [ "$GITHUB_REF_NAME" = "main" ]; then
            BUILD_CHANNEL=stable
            EFFECTIVE_BUILD_NUMBER="${APP_VERSION}"
          else
            BUILD_CHANNEL=preview
            EFFECTIVE_BUILD_NUMBER="${BUILD_NUMBER}"
          fi
          DART_DEFINES="--build-name=${APP_VERSION} --build-number=${EFFECTIVE_BUILD_NUMBER}"
          DART_DEFINES="$DART_DEFINES --dart-define=BUILD_CHANNEL=${BUILD_CHANNEL}"
          if [ -n "$ETH_RPC_URL" ]; then
            DART_DEFINES="$DART_DEFINES --dart-define=ETH_RPC_URL=${ETH_RPC_URL}"
          fi
          flutter build macos --release $DART_DEFINES

      # ── Inject Go dylib into app bundle ──
      - name: Copy dylib into app bundle
        run: |
          APP_DIR=$(find build/macos/Build/Products/Release -name "*.app" -maxdepth 1 | head -1)
          mkdir -p "$APP_DIR/Contents/Frameworks"
          cp build/go/libnodeneo.dylib "$APP_DIR/Contents/Frameworks/"
          echo "APP_DIR=$APP_DIR" >> "$GITHUB_ENV"

      # ── Sign + notarize (dev AND main) ─────────────────────────────────
      # Both branches run the full Apple signing + notarization path so
      # the dev preview DMG is a true production smoke test. Only the
      # downstream GH Release publication is `main`-only — see the bottom
      # of this file. If any step here fails (cert expired, profile
      # mismatch, Apple notary service hiccup) we want to know on the
      # next dev push, not on release day.
      - name: Import signing certificate
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm certificate.p12

      - name: Embed provisioning profile
        env:
          PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE }}
        run: |
          echo "$PROVISIONING_PROFILE" | base64 --decode \
            > "$APP_DIR/Contents/embedded.provisionprofile"
          echo "Embedded provisioning profile into app bundle"

      - name: Expand entitlements variables for CI signing
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          sed -i '' "s/\$(AppIdentifierPrefix)/${APPLE_TEAM_ID}./g" \
            macos/Runner/Release.entitlements
          echo "Expanded Release.entitlements:"
          cat macos/Runner/Release.entitlements

      - name: Codesign app bundle
        env:
          SIGNING_IDENTITY: ${{ secrets.SIGNING_IDENTITY }}
        run: |
          codesign --deep --force --options runtime \
            --sign "$SIGNING_IDENTITY" \
            "$APP_DIR/Contents/Frameworks/libnodeneo.dylib"
          codesign --deep --force --options runtime \
            --entitlements macos/Runner/Release.entitlements \
            --sign "$SIGNING_IDENTITY" \
            "$APP_DIR"

      # ── Notarize the .app ──
      # Submit a ZIP of the .app for notarization, then staple the ticket
      # onto the .app BEFORE packaging the DMG. This way when the user drags
      # the app out of the DMG the notarization ticket travels with it.
      - name: Notarize app bundle
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          ditto -c -k --keepParent "$APP_DIR" build/app-for-notarization.zip
          xcrun notarytool submit build/app-for-notarization.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 15m
          xcrun stapler staple "$APP_DIR"
          rm build/app-for-notarization.zip

      # ── Package DMG (branded installer with background & icon layout) ──
      - name: Install create-dmg
        run: brew install create-dmg

      - name: Package DMG
        run: |
          APP_NAME=$(basename "$APP_DIR" .app)
          # Dev DMGs include the build number so a preview download is
          # visually distinct from a shipped release on disk:
          #   main → Node Neo-3.4.0-macOS.dmg
          #   dev  → Node Neo-3.4.0+6-macOS.dmg   (matches TestFlight "(6)")
          # BUILD_NUMBER is resolved up-front from the iOS workflow's
          # run_number for the same commit, so this DMG name and the
          # corresponding TestFlight CFBundleVersion stay in lockstep.
          # The .app *inside* the DMG always reports CFBundleShortVersionString
          # = ${APP_VERSION} (no suffix) because that's what pubspec carries;
          # the suffix is purely a filename / artifact-naming hint that
          # mirrors the in-app "v3.4.0+6" preview label.
          if [ "$GITHUB_REF_NAME" = "main" ]; then
            DMG_VERSION="${APP_VERSION}"
          else
            DMG_VERSION="${APP_VERSION}+${BUILD_NUMBER}"
          fi
          DMG_NAME="Node Neo-${DMG_VERSION}-macOS.dmg"
          DMG_PATH="build/${DMG_NAME}"

          create-dmg \
            --volname "$APP_NAME v${APP_VERSION}" \
            --background "assets/branding/dmg-background.png" \
            --window-pos 200 100 \
            --window-size 720 420 \
            --icon-size 120 \
            --icon "$APP_NAME.app" 190 210 \
            --app-drop-link 530 210 \
            --text-size 14 \
            --no-internet-enable \
            "$DMG_PATH" \
            "$APP_DIR"

          echo "DMG_PATH=${DMG_PATH}" >> "$GITHUB_ENV"
          echo "DMG_NAME=${DMG_NAME}" >> "$GITHUB_ENV"

      # ── Notarize + staple DMG ──
      # The .app inside is already notarized+stapled. The DMG is a separate
      # artifact that needs its own notarization submission for stapling.
      # We staple the DMG too so users who keep the DMG around (rather than
      # mounting once and trashing it) don't get a Gatekeeper prompt the
      # second time they double-click it.
      - name: Notarize and staple DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 15m
          xcrun stapler staple "$DMG_PATH"

      # ── Upload artifact (all branches) ──
      - name: Upload DMG artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.DMG_NAME }}
          path: ${{ env.DMG_PATH }}
          retention-days: 14

      # ── GitHub Release (main only) ──────────────────────────────────
      # macOS is the sole owner of the release tag and the GitHub Release
      # itself: it's the only platform with a downloadable binary asset
      # (the signed/notarized DMG). iOS distributes through TestFlight on
      # `dev` and through the App Store production track on `main` — its
      # workflow no longer creates a tag or a release on this repo, so
      # the macOS workflow can publish unconditionally.
      #
      # The defensive `if release exists, upload --clobber` guard below
      # is kept as belt-and-suspenders: it costs nothing on the happy
      # path and rescues any future state where the tag/release somehow
      # already exists for this commit (manual creation, a re-run, etc.)
      # so the workflow never fails with the "tag already exists" error
      # that surfaced during the v3.4.0 release.
      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Tag-or-skip. iOS does the same dance, so whichever wins the
          # race pushes the tag and the loser sees "Everything up-to-date".
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "Tag $TAG_NAME already exists locally; nothing to push."
          else
            git tag "$TAG_NAME"
            git push origin "$TAG_NAME"
          fi

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "GitHub Release $TAG_NAME already exists (likely from build-ios.yml)."
            echo "Attaching macOS DMG to the existing release..."
            gh release upload "$TAG_NAME" "$DMG_PATH" --clobber
            exit 0
          fi

          # Build release notes: repo RELEASE_NOTES.md (if present) + a
          # platform-aware download table that mentions both iOS and
          # macOS. Using the same shape as build-ios.yml so the release
          # body looks identical no matter which workflow won the race.
          : > /tmp/release-notes.md
          if [ -f RELEASE_NOTES.md ]; then
            cat RELEASE_NOTES.md >> /tmp/release-notes.md
            printf '\n---\n\n' >> /tmp/release-notes.md
          fi
          cat <<'ASSET_TABLE' >> /tmp/release-notes.md
          ## Download

          Signed and notarized — download, mount, drag to Applications (macOS); install via TestFlight or the App Store (iOS).

          | Platform | Channel | Notes |
          |----------|---------|-------|
          | iOS / iPadOS | TestFlight + App Store | Install via TestFlight (beta) or the App Store (`com.absgrafx.nodeneo`) once promoted from this build. |
          | macOS | GitHub Releases (signed + notarized DMG) | Download `Node Neo-VERSION-macOS.dmg` from Assets below. |

          ASSET_TABLE
          sed -i '' "s/VERSION/${APP_VERSION}/g" /tmp/release-notes.md

          gh release create "$TAG_NAME" "$DMG_PATH" \
            --title "Node Neo $TAG_NAME" \
            --notes-file /tmp/release-notes.md \
            --latest
