name: macOS Build & Release
#
# Branch Strategy (mirrors Morpheus-Lumerin-Node):
#   • dev:  Build + test only — DMG uploaded as artifact, no signing/notarization
#   • main: Build + sign + notarize + DMG published as GitHub Release
#
# SemVer Tagging:
#   • main: auto-bumps MINOR (v1.1.0, v1.2.0, …) unless VMAJ_NEW is raised
#   • dev:  vMAJ.MIN.COMMITS-dev (e.g. v1.0.7-dev) — not published
#
# Trigger: fires on push (i.e. PR merge) to dev or main only.

on:
  push:
    branches: [dev, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.41.7"
  GO_VERSION: "1.26"

permissions:
  contents: write

jobs:
  # ── SemVer Tag Generation ─────────────────────────────────────────
  generate-tag:
    runs-on: ubuntu-latest
    name: Generate SemVer Tag
    outputs:
      tag_name: ${{ steps.semver.outputs.tag_name }}
      vfull: ${{ steps.semver.outputs.vfull }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Compute next version
        id: semver
        run: |
          # Source of truth is pubspec.yaml's `version:` line. Format:
          # "version: 3.4.0+1" -> VPUB=3.4.0. The DMG name and git tag both
          # derive from this; matches the iOS workflow byte-for-byte so a
          # given commit gets the same tag whether it ships to macOS or iOS.
          VPUB=$(grep -E '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          if ! echo "$VPUB" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::pubspec.yaml version is not a clean semver: '${VPUB}'"
            exit 1
          fi

          if [ "$GITHUB_REF_NAME" = "main" ]; then
            VFULL=$VPUB
            VTAG=v${VFULL}
          else
            # Dev preview: same VFULL as the upcoming main release; the
            # git tag gets a "-dev" suffix so it doesn't collide with the
            # eventual main release tag for the same pubspec version.
            VFULL=$VPUB
            RNAME=${GITHUB_REF_NAME##*/}
            VTAG=v${VFULL}-${RNAME}
          fi

          echo "tag_name=${VTAG}" >> "$GITHUB_OUTPUT"
          echo "vfull=${VFULL}"   >> "$GITHUB_OUTPUT"
          echo "### Build Tag: \`${VTAG}\`" >> "$GITHUB_STEP_SUMMARY"

  # ── Build ──────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    needs: generate-tag
    timeout-minutes: 30
    env:
      APP_VERSION: ${{ needs.generate-tag.outputs.vfull }}
      TAG_NAME: ${{ needs.generate-tag.outputs.tag_name }}

    steps:
      - uses: actions/checkout@v5

      # ── Toolchains ──
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go/go.mod

      - name: Install Python dependencies (branding pipeline)
        run: pip3 install --break-system-packages cairosvg

      # ── Resolve embedded proxy-router version ──
      # Drop --single-branch and explicitly fetch main so `git describe --tags`
      # can reach release tags (cut from main) as ancestors of the dev-pinned
      # commit. Without this the in-app About screen shows the bare 12-char
      # hash instead of the v7.0.0-N-g<hash> form the ldflag is meant to
      # produce. Cosmetic, but it's the version users read on every release.
      - name: Determine embedded proxy-router version
        id: pr_version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_COMMIT=$(grep 'MorpheusAIs/Morpheus-Lumerin-Node/proxy-router' go/go.mod | grep -oE '[0-9a-f]{12}$' || echo "unknown")
          git clone --filter=blob:none --no-checkout \
            https://github.com/MorpheusAIs/Morpheus-Lumerin-Node.git /tmp/morpheus-lumerin-node 2>/dev/null || true
          cd /tmp/morpheus-lumerin-node
          git fetch origin --tags 2>/dev/null || true
          git fetch origin main:main 2>/dev/null || true
          PR_VERSION=$(git describe --tags --always --match 'v*' "$PR_COMMIT" 2>/dev/null || echo "$PR_COMMIT")
          echo "PR_VERSION=$PR_VERSION" >> "$GITHUB_OUTPUT"
          echo "PR_COMMIT=$PR_COMMIT" >> "$GITHUB_OUTPUT"
          echo "Embedded proxy-router: $PR_VERSION ($PR_COMMIT)"

      # ── Build Go dylib ──
      - name: Build Go shared library
        env:
          PR_VERSION: ${{ steps.pr_version.outputs.PR_VERSION }}
          PR_COMMIT: ${{ steps.pr_version.outputs.PR_COMMIT }}
        run: make go-macos

      # ── Flutter dependencies ──
      - name: Flutter pub get
        run: flutter pub get

      # ── Branding pipeline ──
      - name: Rasterize brand assets
        run: |
          python3 tools/branding/render_launcher_icons.py
          dart run flutter_launcher_icons
          dart run flutter_native_splash:create

      # ── Disable Xcode signing for flutter build (all branches) ──
      # Xcode auto-signing requires a local cert at build time. We strip it
      # here so `flutter build` always succeeds unsigned. On main the post-build
      # codesign step re-signs the .app with the imported Developer ID cert.
      - name: Strip Xcode auto-signing for CI
        run: |
          sed -i '' 's/CODE_SIGN_IDENTITY = "Apple Development"/CODE_SIGN_IDENTITY = "-"/g' macos/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_STYLE = Automatic/CODE_SIGN_STYLE = Manual/g' macos/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/DEVELOPMENT_TEAM = .*;/DEVELOPMENT_TEAM = "";/g' macos/Runner.xcodeproj/project.pbxproj

      # ── Build release app (inject version + optional premium RPC) ──
      # BUILD_CHANNEL is consumed by lib/constants/app_brand.dart's
      # AppBrand.formatVersion() to decide whether the in-app About
      # screen shows "v3.4.0" (main release) or "v3.4.0+42" (dev preview).
      # The CFBundleShortVersionString in Info.plist stays clean X.Y.Z
      # either way; the +RUN suffix is purely a display-layer cue.
      - name: Flutter build macOS (release)
        env:
          ETH_RPC_URL: ${{ secrets.ETH_RPC_URL }}
        run: |
          if [ "$GITHUB_REF_NAME" = "main" ]; then
            BUILD_CHANNEL=stable
          else
            BUILD_CHANNEL=preview
          fi
          DART_DEFINES="--build-name=${APP_VERSION} --build-number=${GITHUB_RUN_NUMBER}"
          DART_DEFINES="$DART_DEFINES --dart-define=BUILD_CHANNEL=${BUILD_CHANNEL}"
          if [ -n "$ETH_RPC_URL" ]; then
            DART_DEFINES="$DART_DEFINES --dart-define=ETH_RPC_URL=${ETH_RPC_URL}"
          fi
          flutter build macos --release $DART_DEFINES

      # ── Inject Go dylib into app bundle ──
      - name: Copy dylib into app bundle
        run: |
          APP_DIR=$(find build/macos/Build/Products/Release -name "*.app" -maxdepth 1 | head -1)
          mkdir -p "$APP_DIR/Contents/Frameworks"
          cp build/go/libnodeneo.dylib "$APP_DIR/Contents/Frameworks/"
          echo "APP_DIR=$APP_DIR" >> "$GITHUB_ENV"

      # ── Sign (main only) ──
      - name: Import signing certificate
        if: github.ref == 'refs/heads/main'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm certificate.p12

      - name: Embed provisioning profile
        if: github.ref == 'refs/heads/main'
        env:
          PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE }}
        run: |
          echo "$PROVISIONING_PROFILE" | base64 --decode \
            > "$APP_DIR/Contents/embedded.provisionprofile"
          echo "Embedded provisioning profile into app bundle"

      - name: Expand entitlements variables for CI signing
        if: github.ref == 'refs/heads/main'
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          sed -i '' "s/\$(AppIdentifierPrefix)/${APPLE_TEAM_ID}./g" \
            macos/Runner/Release.entitlements
          echo "Expanded Release.entitlements:"
          cat macos/Runner/Release.entitlements

      - name: Codesign app bundle
        if: github.ref == 'refs/heads/main'
        env:
          SIGNING_IDENTITY: ${{ secrets.SIGNING_IDENTITY }}
        run: |
          codesign --deep --force --options runtime \
            --sign "$SIGNING_IDENTITY" \
            "$APP_DIR/Contents/Frameworks/libnodeneo.dylib"
          codesign --deep --force --options runtime \
            --entitlements macos/Runner/Release.entitlements \
            --sign "$SIGNING_IDENTITY" \
            "$APP_DIR"

      # ── Notarize the .app (main only) ──
      # Submit a ZIP of the .app for notarization, then staple the ticket
      # onto the .app BEFORE packaging the DMG. This way when the user drags
      # the app out of the DMG the notarization ticket travels with it.
      - name: Notarize app bundle
        if: github.ref == 'refs/heads/main'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          ditto -c -k --keepParent "$APP_DIR" build/app-for-notarization.zip
          xcrun notarytool submit build/app-for-notarization.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 15m
          xcrun stapler staple "$APP_DIR"
          rm build/app-for-notarization.zip

      # ── Package DMG (branded installer with background & icon layout) ──
      - name: Install create-dmg
        run: brew install create-dmg

      - name: Package DMG
        run: |
          APP_NAME=$(basename "$APP_DIR" .app)
          # Dev DMGs include the build number so a preview download is
          # visually distinct from a shipped release on disk:
          #   main → Node Neo-3.4.0-macOS.dmg
          #   dev  → Node Neo-3.4.0+42-macOS.dmg
          # The .app *inside* the DMG always reports CFBundleShortVersionString
          # = ${APP_VERSION} (no suffix) because that's what pubspec carries;
          # the suffix is purely a filename / artifact-naming hint that
          # mirrors the in-app "v3.4.0+42" preview label.
          if [ "$GITHUB_REF_NAME" = "main" ]; then
            DMG_VERSION="${APP_VERSION}"
          else
            DMG_VERSION="${APP_VERSION}+${GITHUB_RUN_NUMBER}"
          fi
          DMG_NAME="Node Neo-${DMG_VERSION}-macOS.dmg"
          DMG_PATH="build/${DMG_NAME}"

          create-dmg \
            --volname "$APP_NAME v${APP_VERSION}" \
            --background "assets/branding/dmg-background.png" \
            --window-pos 200 100 \
            --window-size 720 420 \
            --icon-size 120 \
            --icon "$APP_NAME.app" 190 210 \
            --app-drop-link 530 210 \
            --text-size 14 \
            --no-internet-enable \
            "$DMG_PATH" \
            "$APP_DIR"

          echo "DMG_PATH=${DMG_PATH}" >> "$GITHUB_ENV"
          echo "DMG_NAME=${DMG_NAME}" >> "$GITHUB_ENV"

      # ── Notarize + staple DMG (main only) ──
      # The .app inside is already notarized+stapled. The DMG is a separate
      # artifact that needs its own notarization submission for stapling.
      - name: Notarize and staple DMG
        if: github.ref == 'refs/heads/main'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 15m
          xcrun stapler staple "$DMG_PATH"

      # ── Upload artifact (all branches) ──
      - name: Upload DMG artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.DMG_NAME }}
          path: ${{ env.DMG_PATH }}
          retention-days: 14

      # ── GitHub Release (main only) ──
      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git tag "$TAG_NAME"
          git push origin "$TAG_NAME"

          # Build release notes: repo RELEASE_NOTES.md (if present) + asset table
          : > /tmp/release-notes.md
          if [ -f RELEASE_NOTES.md ]; then
            cat RELEASE_NOTES.md >> /tmp/release-notes.md
            printf '\n---\n\n' >> /tmp/release-notes.md
          fi
          cat <<'ASSET_TABLE' >> /tmp/release-notes.md
          ## Download

          Signed and notarized — download, mount, drag to Applications.

          | Asset | Description |
          |-------|-------------|
          | `Node Neo-VERSION-macOS.dmg` | macOS desktop client (Apple Silicon / Intel universal) |

          ASSET_TABLE
          sed -i '' "s/VERSION/${APP_VERSION}/g" /tmp/release-notes.md

          gh release create "$TAG_NAME" "$DMG_PATH" \
            --title "Node Neo $TAG_NAME" \
            --notes-file /tmp/release-notes.md \
            --latest
